name: Deploy API

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: deploy-api-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API over SSH
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/achievno_vps
          chmod 600 ~/.ssh/achievno_vps

      - name: Deploy with Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          CLOUDFLARE_R2_ENDPOINT_URL: ${{ secrets.CLOUDFLARE_R2_ENDPOINT_URL }}
        run: |
          ssh -i ~/.ssh/achievno_vps -o StrictHostKeyChecking=accept-new "${VPS_USER}@${VPS_HOST}" \
            "VPS_DEPLOY_PATH='${VPS_DEPLOY_PATH}' \
             PROD_DATABASE_URL='${PROD_DATABASE_URL}' \
             DJANGO_SECRET_KEY='${DJANGO_SECRET_KEY}' \
             ACCESS_TOKEN_SECRET='${ACCESS_TOKEN_SECRET}' \
             EMAIL_HOST_USER='${EMAIL_HOST_USER}' \
             EMAIL_HOST_PASSWORD='${EMAIL_HOST_PASSWORD}' \
             CLOUDFLARE_R2_ACCOUNT_ID='${CLOUDFLARE_R2_ACCOUNT_ID}' \
             CLOUDFLARE_R2_ACCESS_KEY_ID='${CLOUDFLARE_R2_ACCESS_KEY_ID}' \
             CLOUDFLARE_R2_SECRET_ACCESS_KEY='${CLOUDFLARE_R2_SECRET_ACCESS_KEY}' \
             CLOUDFLARE_R2_BUCKET='${CLOUDFLARE_R2_BUCKET}' \
             CLOUDFLARE_R2_ENDPOINT_URL='${CLOUDFLARE_R2_ENDPOINT_URL}' \
             bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$VPS_DEPLOY_PATH"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          install -m 700 -d deploy/production
          umask 077
          cat > deploy/production/.env <<EOF
          DATABASE_URL=${PROD_DATABASE_URL}
          DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
          ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
          DJANGO_ALLOWED_HOSTS=api.achievno.dkar-dev.ru,localhost,127.0.0.1,testserver
          CORS_ALLOWED_ORIGINS=https://achievno.vercel.app
          ACHIEVNO_PUBLIC_APP_URL=https://achievno.vercel.app
          ACHIEVNO_AUTH_COOKIE_SECURE=true
          ACHIEVNO_AUTH_COOKIE_SAMESITE=None
          ACHIEVNO_SEND_VERIFICATION_EMAIL=true
          EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
          EMAIL_HOST=smtp.gmail.com
          EMAIL_PORT=587
          EMAIL_USE_TLS=true
          EMAIL_USE_SSL=false
          EMAIL_HOST_USER=${EMAIL_HOST_USER}
          EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
          DEFAULT_FROM_EMAIL=${EMAIL_HOST_USER}
          API_HOST_BIND=127.0.0.1
          API_HOST_PORT=8000
          EVIDENCE_STORAGE_BACKEND=local
          EVIDENCE_STORAGE_LOCAL_ROOT=/app/var/evidence
          CLOUDFLARE_R2_ACCOUNT_ID=${CLOUDFLARE_R2_ACCOUNT_ID}
          CLOUDFLARE_R2_ACCESS_KEY_ID=${CLOUDFLARE_R2_ACCESS_KEY_ID}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY=${CLOUDFLARE_R2_SECRET_ACCESS_KEY}
          CLOUDFLARE_R2_BUCKET=${CLOUDFLARE_R2_BUCKET}
          CLOUDFLARE_R2_ENDPOINT_URL=${CLOUDFLARE_R2_ENDPOINT_URL}
          EOF

          docker compose -f deploy/production/docker-compose.yml build api
          docker compose -f deploy/production/docker-compose.yml up -d api
          docker compose -f deploy/production/docker-compose.yml ps

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker compose -f deploy/production/docker-compose.yml logs --tail=160 api
              exit 1
            fi
            sleep 2
          done

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health/db; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker compose -f deploy/production/docker-compose.yml logs --tail=160 api
              exit 1
            fi
            sleep 2
          done
          REMOTE
