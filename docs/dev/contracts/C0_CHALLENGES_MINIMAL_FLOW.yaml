id: C0_CHALLENGES_MINIMAL_FLOW
title: Implement minimal personal challenge flow for MVP
priority: P0
status: ready_for_codex
linear:
  team: Achievno
  project: Achievno
  label: Feature
  priority: 1
  suggested_title: "[MVP][C0] Implement minimal challenges flow"

objective: >
  Implement the minimal real challenge flow for Achievno MVP on top of the existing Django backend, unmanaged PostgreSQL
  models, and Next.js client. This contract focuses on single-user/personal challenge participation and read/write basics:
  list, create, detail, join/self-participate, record progress/completion, and archive/close where supported by schema.
  Do not implement full group challenge competition, leaderboards beyond simple current-user summary, rewards, approvals,
  evidence, or social discovery.

context:
  product: Achievno
  master_contract: docs/dev/contracts/achievno_mvp_24h_delivery_contract.yaml
  global_rules: AGENTS.md
  depends_on:
    - A4_ACCOUNTS_AUTH_SESSIONS
    - P0_MAIN_AGGREGATE_AND_PROFILE
    - P1_PERSONAL_ACHIEVEMENTS
  current_backend:
    path: app/server
    status: Django + DRF + cookie auth + unmanaged models + personal achievements
  current_frontend:
    path: app/client
    status: Auth wired; /app/spaces, /app/me, and personal achievement flow backed by API
  database:
    role: external_dependency
    connection_env: DATABASE_URL
    tables:
      - challenges
      - challenge_participants
      - challenge_completion_events
      - owner_contexts
      - achievements
      - achievement_logs
    rule: no schema changes, no migrations
  architecture:
    bounded_context: challenges
    layering_rule: API views call application services/queries; application services use infrastructure repositories/selectors/models.

scope:
  include:
    backend:
      - Add authenticated challenge API endpoints under /api/v1/challenges/.
      - List challenges visible/owned/participated by current profile for MVP.
      - Create a minimal personal challenge owned by current user's personal owner_context or profile where schema supports it.
      - Ensure current profile can join/participate in a created challenge.
      - View challenge detail with current participant state.
      - Record participant progress/completion using challenge_participants and/or challenge_completion_events.
      - Archive/cancel/close a challenge only if the existing schema has a safe status field; otherwise omit close endpoint and report gap.
      - Return stable DTOs, not raw DB rows.
      - Add backend tests for auth requirement, list/create/detail/join/progress/complete.
      - Add live smoke command: python manage.py achievno_smoke_challenges.
      - Keep previous DB/model/auth/personal-achievements smoke commands green.
    frontend:
      - Add typed challenges API adapter using the existing central API client.
      - Wire or implement /app/challenges list page.
      - Wire or implement /app/challenges/create page.
      - Wire or implement /app/challenges/[id] detail/progress page.
      - Use real API when NEXT_PUBLIC_USE_MOCKS=false.
      - Allow explicit demo fallback only when NEXT_PUBLIC_USE_MOCKS=true.
      - Show loading, error, empty, and success states.
      - Keep UI minimal; no global redesign.
  exclude:
    - Full group challenge competition.
    - Public challenge marketplace/discovery.
    - Complex leaderboards.
    - Rewards/economy.
    - Approval/evidence flows.
    - Friend invitations into challenges.
    - Notification mutations.
    - Browser e2e framework.
    - Schema changes or migrations.
    - Seed/reset scripts.

allowed_files:
  - app/server/apps/challenges/**
  - app/server/apps/platform/**
  - app/server/config/urls.py
  - app/client/**
  - docs/dev/contracts/C0_CHALLENGES_MINIMAL_FLOW.yaml

backend_api:
  base_path: /api/v1/challenges
  endpoints:
    - method: GET
      path: /api/v1/challenges
      auth: required_access_cookie
      query:
        status: optional_string
        limit: optional_number_default_50
      response:
        items: array
        total_count: number
    - method: POST
      path: /api/v1/challenges
      auth: required_access_cookie
      request:
        title: string
        description: string_optional
        goal_title: string_optional
        target_value: decimal_optional
        unit_label: string_optional
        starts_at: iso_datetime_optional
        ends_at: iso_datetime_optional
      response:
        challenge: object
    - method: GET
      path: /api/v1/challenges/{challenge_id}
      auth: required_access_cookie
      response:
        challenge: object
        participant: object_optional
        recent_completion_events: array
    - method: POST
      path: /api/v1/challenges/{challenge_id}/join
      auth: required_access_cookie
      request: none
      response:
        challenge: object
        participant: object
    - method: POST
      path: /api/v1/challenges/{challenge_id}/progress
      auth: required_access_cookie
      request:
        delta_value: decimal
        note_text: string_optional
      response:
        challenge: object
        participant: object
        event: object_optional
    - method: POST
      path: /api/v1/challenges/{challenge_id}/complete
      auth: required_access_cookie
      request:
        note_text: string_optional
      response:
        challenge: object
        participant: object
        event: object

backend_rules:
  visibility:
    - MVP may limit challenge access to challenges created by or participated in by the current profile.
    - Return 404 for inaccessible challenge ids.
  creation:
    - Use existing schema fields only.
    - If schema requires owner_context, use current profile personal owner_context.
    - Default status should be active/in_progress/open depending on actual schema values.
    - If challenge_participants is required for creator, create participant row for creator.
  progress:
    - Use challenge_participants and challenge_completion_events according to existing model fields.
    - Do not write achievement tables unless schema or existing functions make that unavoidable.
    - Do not create challenge-related notifications in C0.
  dto_fields:
    challenge:
      - challenge_id
      - title
      - description
      - status
      - target_value
      - unit_label
      - starts_at
      - ends_at
      - created_at
      - updated_at
      - participant_count
    participant:
      - profile_id
      - status
      - progress_value
      - completed_at
      - joined_at
    event:
      - challenge_completion_event_id
      - profile_id
      - delta_value
      - note_text
      - created_at
  validation:
    - title min length 2, max 180.
    - target_value, if present, must be positive.
    - delta_value must be non-zero for progress.
    - Use stable JSON error shapes.

backend_layout:
  preferred_files:
    - app/server/apps/challenges/api/serializers.py
    - app/server/apps/challenges/api/urls.py
    - app/server/apps/challenges/api/views.py
    - app/server/apps/challenges/application/challenge_service.py
    - app/server/apps/challenges/application/challenge_query.py
    - app/server/apps/challenges/domain/errors.py
    - app/server/apps/challenges/infrastructure/repositories.py
    - app/server/apps/challenges/tests/test_challenges_api.py
    - app/server/apps/challenges/management/commands/achievno_smoke_challenges.py
    - app/server/apps/challenges/tests/test_challenges_smoke_command.py

frontend_api:
  preferred_files:
    - app/client/lib/achievno/api/challenges.ts
    - app/client/lib/achievno/challenges/use-challenges.ts
    - app/client/lib/achievno/challenges/use-challenge-detail.ts
  requirements:
    - Use existing central API client.
    - Use credentials: include through existing client.
    - Do not read cookies directly.
    - Do not silently fall back to demo data when NEXT_PUBLIC_USE_MOCKS=false.

frontend_routes:
  routes:
    - path: /app/challenges
      role: challenges list
    - path: /app/challenges/create
      role: create challenge
    - path: /app/challenges/[id]
      role: challenge detail/progress
  requirements:
    - Require auth via existing AuthProvider/useAuth behavior.
    - Show list of challenges from API.
    - Show empty state for new user.
    - Create minimal challenge.
    - Join created challenge if needed.
    - Add progress or complete.
    - Navigate back to /app/challenges or /app/spaces after successful actions where appropriate.

mock_policy:
  NEXT_PUBLIC_USE_MOCKS_false:
    - Challenge routes must use API only.
    - API failure must show error state, not demo data.
  NEXT_PUBLIC_USE_MOCKS_true:
    - Explicit demo data is allowed for UI preview.
    - Demo path must be obvious and grep-able.

live_smoke_command:
  name: achievno_smoke_challenges
  behavior:
    - Refuse sqlite fallback.
    - Require PostgreSQL DATABASE_URL.
    - Create or reuse a verified smoke auth account through existing auth smoke helpers if practical.
    - Create a minimal challenge.
    - List challenges and find created item.
    - Detail created item.
    - Join/self-participate if not already participant.
    - Add progress or complete.
    - Confirm participant state/event changed.
    - Print safe step results only; no tokens/cookies/hashes.
  success_output_must_contain:
    - challenges smoke ok
    - create challenge ok
    - list challenges ok
    - detail challenge ok
    - join challenge ok
    - challenge progress ok
    - complete challenge ok

forbidden:
  - do not modify PostgreSQL schema
  - do not add migrations
  - do not implement public challenge marketplace
  - do not implement complex leaderboard
  - do not implement rewards/economy
  - do not implement approval/evidence APIs
  - do not implement notification mutations
  - do not store auth tokens in frontend storage
  - do not bypass auth checks for challenge endpoints
  - do not silently fake challenge writes when mocks are disabled
  - do not rewrite frontend UI globally
  - do not weaken A2/A3/A4/P0/P1 checks or smoke commands

acceptance:
  backend_commands:
    - cd app/server && uv run python manage.py check
    - cd app/server && uv run python manage.py test
    - cd app/server && DATABASE_URL="$DATABASE_URL" uv run python manage.py achievno_check_db
    - cd app/server && DATABASE_URL="$DATABASE_URL" uv run python manage.py achievno_check_models
    - cd app/server && DATABASE_URL="$DATABASE_URL" uv run python manage.py achievno_smoke_auth
    - cd app/server && DATABASE_URL="$DATABASE_URL" uv run python manage.py achievno_smoke_personal_achievements
    - cd app/server && DATABASE_URL="$DATABASE_URL" uv run python manage.py achievno_smoke_challenges
  frontend_commands:
    - cd app/client && npm run build
    - cd app/client && npm run lint
    - cd app/client && npx tsc --noEmit
  manual_local_flow:
    setup:
      - Start Django server with DATABASE_URL pointing to local PostgreSQL.
      - Start Next.js client with NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:8000 and NEXT_PUBLIC_USE_MOCKS=false.
    checks:
      - Sign in.
      - Open /app/challenges.
      - Create a challenge.
      - Open challenge detail.
      - Join/self-participate if needed.
      - Add progress or complete.
      - Refresh page and confirm data persists.
      - Break API URL and confirm challenge screens show error state instead of mock data.
  manual_checks:
    - Unauthenticated challenge API calls return 401/403.
    - Inaccessible challenge ids return 404.
    - New/empty user does not crash UI.
    - No schema/migration changes were introduced.

output_required:
  - summary
  - changed_files
  - commands_run
  - backend_challenges_result
  - frontend_challenges_flow_result
  - backend_smoke_result
  - commit_hash
  - known_gaps
  - blockers_if_any

recommended_codex_goal: >
  Implement docs/dev/contracts/C0_CHALLENGES_MINIMAL_FLOW.yaml exactly. Add authenticated minimal challenges API and
  frontend flow for list, create, detail, join/self-participate, progress, and complete. Use existing unmanaged schema.
  Do not add migrations, schema changes, marketplace, complex leaderboard, rewards, approvals, evidence, or notifications.

next_contracts:
  - P2_FRIENDS_AND_GROUPS_READS
  - A1_PREPROD_PODMAN_RUNTIME
