risk_register:
  - id: RISK-001
    title: Codex expands scope and rewrites architecture
    mitigation: Use YAML contracts, AGENTS.md, allowed_files, forbidden_changes, and acceptance commands.
  - id: RISK-002
    title: Django migration accidentally tries to own existing schema
    mitigation: managed_false_models, no schema migrations, explicit SQL patch contracts only.
  - id: RISK-003
    title: Frontend keeps working from mocks while API is broken
    mitigation: preprod_api_only_mode, no silent mock fallback, smoke checks.
  - id: RISK-004
    title: Auth becomes parallel to existing DB model
    mitigation: custom Account model over accounts table and user_sessions refresh hash.
  - id: RISK-005
    title: UI polish consumes time before functionality is green
    mitigation: UI hardening pass starts only after functional smoke gate.
  - id: RISK-006
    title: Challenges are underbuilt despite being core entity
    mitigation: Challenge core types are P0, not read-only.

acceptance_summary:
  contract_done_when:
    - contract_is_committed_to_repo
    - linear_team_and_project_are_verified
    - next_action_can_generate_A0_DJANGO_SERVER_REPLACEMENT_contract
  mvp_done_when:
    - local_preprod_starts
    - backend_connects_to_existing_db
    - auth_works_with_httponly_cookies
    - core_screens_use_api_only
    - personal_friend_group_achievement_flows_work_end_to_end
    - challenge_core_types_work_end_to_end_or_documented_as_explicit_partial_with_reason
    - approval_evidence_metadata_basic_flow_works
    - notifications_basic_loads
    - smoke_script_passes
    - UI_hardening_pass_completed_after_functional_green
