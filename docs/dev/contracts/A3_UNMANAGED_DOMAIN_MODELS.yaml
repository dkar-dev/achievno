id: A3_UNMANAGED_DOMAIN_MODELS
title: Map current PostgreSQL baseline to unmanaged Django domain models
priority: P0
status: ready_for_codex
linear:
  team: Achievno
  project: Achievno
  label: Task
  priority: 1
  suggested_title: "[MVP][A3] Map baseline DB to unmanaged Django domain models"

objective: >
  Add unmanaged Django ORM model classes for the current Achievno PostgreSQL baseline tables required by MVP flows,
  split across bounded-context infrastructure layers. These models are a DB mapping layer only. Do not implement auth,
  product endpoints, application services, repositories, frontend integration, migrations, or schema changes.

context:
  product: Achievno
  master_contract: docs/dev/contracts/achievno_mvp_24h_delivery_contract.yaml
  global_rules: AGENTS.md
  depends_on:
    - A0_DJANGO_SERVER_REPLACEMENT
    - A2_DB_CONNECTION_AND_SCHEMA_SANITY
    - F0_A2_SCHEMA_SANITY_TABLE_NAMES
  current_backend:
    path: app/server
    status: Django + DRF skeleton with DB health checks
  database:
    role: external_dependency
    runtime: existing local Podman PostgreSQL container
    connection_env: DATABASE_URL
    baseline_dump_sha256: 177ed029f1086078ab2ce5e89eedec9c87d3e61a4a58c3a900d1c12
    schema_status: achievno_check_db passes against local baseline after F0
  architecture:
    style: modular_monolith_practical_hexagonal
    db_access: Django ORM unmanaged models
    model_location_rule: models live in apps/<context>/infrastructure/models.py

scope:
  include:
    - Add unmanaged Django model classes for MVP baseline tables.
    - Split models by bounded context infrastructure modules.
    - Use db_table names matching the existing PostgreSQL schema exactly.
    - Use primary_key fields matching existing table primary keys.
    - Use ForeignKey fields where obvious and safe from the baseline schema.
    - Use choices as plain text/enum-compatible field types without inventing business enums yet.
    - Set managed = False on every baseline table model.
    - Add minimal model import smoke tests.
    - Add a management command or test helper to confirm mapped model db_table names exist in the live DB.
    - Keep achievno_check_db green.
  exclude:
    - Auth implementation or custom Django user model activation.
    - AUTH_USER_MODEL setting.
    - JWT/session logic.
    - API endpoints beyond existing health endpoints.
    - Application services, selectors, repositories, or domain policies.
    - Frontend changes.
    - inspectdb raw output committed as final code.
    - Django migrations for existing schema.
    - Database schema modifications.
    - Data seed/restore/reset scripts.

