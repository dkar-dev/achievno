  - app/server/apps/profiles/infrastructure/models.py
  - app/server/apps/friends/infrastructure/models.py
  - app/server/apps/groups/infrastructure/models.py
  - app/server/apps/achievements/infrastructure/models.py
  - app/server/apps/challenges/infrastructure/models.py
  - app/server/apps/notifications/infrastructure/models.py
  - app/server/apps/platform/infrastructure/models.py
  - app/server/apps/platform/management/commands/achievno_check_models.py
  - app/server/apps/platform/tests/test_unmanaged_models.py
  - docs/dev/contracts/A3_UNMANAGED_DOMAIN_MODELS.yaml

