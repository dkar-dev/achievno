implementation_requirements:
  model_rules:
    - Every model must define class Meta with managed = False and db_table equal to the exact baseline table name.
    - Do not create migrations directories or migration files for these models.
    - For PostgreSQL enum/citext fields, use Django CharField/TextField-compatible mappings for MVP.
    - For jsonb fields, use models.JSONField.
    - For inet fields, use models.GenericIPAddressField or a safe CharField fallback if inspectdb suggests it.
    - For numeric(14,2), use DecimalField(max_digits=14, decimal_places=2).
    - For timestamp with time zone, use DateTimeField.
    - For uuid, use UUIDField.
    - For composite-key tables, use a safe unmanaged model mapping without pretending Django supports composite primary keys perfectly.
    - For composite-key tables, choose one field with primary_key=True only if Django requires it, and document the limitation in code comments minimally.
    - Avoid cross-domain import cycles. Use string model references or db_column fields where necessary.
    - Do not add behavior-heavy model methods.
    - Do not encode domain business rules in models in A3.
  inspectdb_policy:
    - It is allowed to run inspectdb locally as a reference if useful.
    - Do not commit raw inspectdb output.
    - Final code must be split by bounded context modules and cleaned enough for manage.py check.
  django_app_registration:
    - Keep existing apps registered in INSTALLED_APPS.
    - Do not set AUTH_USER_MODEL yet.
    - Ensure model import does not break django setup.
  model_check_command:
    name: achievno_check_models
    behavior:
      - Imports all A3 model classes.
      - Compares each model._meta.db_table against live database table names.
      - Exits non-zero if any mapped db_table is absent.
      - Does not query or mutate row data.
      - Does not inspect columns exhaustively in A3 unless cheap and safe.
    note: This command may reuse apps.platform.infrastructure.db_health helpers.
  tests:
    - Add tests that all A3 model classes have managed = False.
    - Add tests that expected db_table values match the contract mapping.
    - Add tests that model modules import successfully under Django.
    - Tests must pass without a live PostgreSQL DB when DATABASE_URL is absent.

forbidden:
  - do not modify PostgreSQL schema
  - do not add migrations
  - do not run migrate against the existing DB as part of this task
  - do not commit raw inspectdb output
  - do not implement auth endpoints or custom auth behavior
  - do not set AUTH_USER_MODEL
  - do not implement product APIs
  - do not add selectors/repositories/application services in this contract
  - do not modify app/client
  - do not weaken or remove A2 DB health checks
  - do not rename database tables in code away from baseline names

acceptance:
  commands_without_db:
    - cd app/server && uv run python manage.py check
    - cd app/server && uv run python manage.py test
  commands_with_existing_db:
    - cd app/server && DATABASE_URL="$DATABASE_URL" uv run python manage.py achievno_check_db
    - cd app/server && DATABASE_URL="$DATABASE_URL" uv run python manage.py achievno_check_models
  optional_manual_checks:
    - Confirm no migration files were created under app/server/apps/**/migrations.
    - Confirm git diff does not include app/client.
    - Confirm all model Meta classes use managed = False.

output_required:
  - summary
  - changed_files
  - commands_run
  - model_check_result
  - db_check_result
  - commit_hash
  - known_gaps
  - blockers_if_any

recommended_codex_goal: >
  Implement docs/dev/contracts/A3_UNMANAGED_DOMAIN_MODELS.yaml exactly. Add unmanaged Django model mappings for the current
  PostgreSQL baseline tables split across domain infrastructure modules. Do not add migrations, auth, product APIs, frontend
  changes, schema changes, or raw inspectdb output.

next_contracts:
