id: F0_A2_SCHEMA_SANITY_TABLE_NAMES
title: Fix A2 schema sanity required object names to match current PostgreSQL baseline
priority: P0
status: ready_for_codex
linear:
  team: Achievno
  project: Achievno
  label: Bug
  priority: 1
  related_issue: ACH-41

objective: >
  Fix the A2 database health/schema sanity checker so its required and optional schema object lists match the current
  Achievno PostgreSQL baseline dump and existing local database. The current A2 implementation used several planned or
  inferred table names that do not exist in the actual baseline schema.

context:
  product: Achievno
  parent_contract: docs/dev/contracts/A2_DB_CONNECTION_AND_SCHEMA_SANITY.yaml
  parent_issue: ACH-41
  observed_failure:
    command: DATABASE_URL="$DATABASE_URL" uv run python manage.py achievno_check_db
    result: schema sanity failed
    missing_required_tables_reported_by_current_code:
      - achievement_approvals
      - auth_methods
      - challenge_progress
      - user_sessions
  actual_baseline_schema_from_dump:
    auth:
      - account_auth_methods
      - auth_sessions
      - auth_verification_tokens
    approvals:
      - approval_policies
      - approval_policy_approvers
      - approval_requests
      - approval_request_approvers
      - approval_decisions
    challenges:
      - challenges
      - challenge_participants
      - challenge_completion_events
    read_models_views:
      - achievement_approval_overview
      - achievement_overview
      - approval_decisions_overview
      - challenge_winners_history
      - connected_signin_methods
      - friend_connections_overview
      - group_membership_overview
      - notifications_overview
      - pending_approval_requests
      - unified_invites_overview

scope:
  include:
    - Update DB health required table names to match the current baseline schema.
    - Replace auth_methods with account_auth_methods.
    - Replace user_sessions with auth_sessions.
    - Replace achievement_approvals with the actual approval tables.
    - Replace challenge_progress with challenge_completion_events or remove it if progress is represented through participants/logs/events in the baseline.
    - Update optional read model/view names to match actual baseline views.
    - Update tests to assert the corrected required/optional object names.
    - Update A2 contract critical_schema section if needed so docs match implementation.
    - Keep /health app-only and /health/db behavior unchanged.
  exclude:
    - inspectdb.
    - unmanaged Django models.
    - auth implementation.
    - product API endpoints.
    - frontend changes.
    - Podman runtime scripts.
    - database restore/reset scripts.
    - Django migrations for existing schema.
    - SQL schema patches.
    - any PostgreSQL schema changes.

allowed_files:
  - app/server/apps/platform/infrastructure/db_health.py
  - app/server/apps/platform/tests/test_db_health.py
  - docs/dev/contracts/A2_DB_CONNECTION_AND_SCHEMA_SANITY.yaml
  - docs/dev/contracts/F0_A2_SCHEMA_SANITY_TABLE_NAMES.yaml

required_tables_target:
  - accounts
  - user_profiles
  - account_auth_methods
  - auth_sessions
  - auth_verification_tokens
  - achievements
  - achievement_logs
  - achievement_assignees
  - approval_policies
  - approval_policy_approvers
  - approval_requests
  - approval_request_approvers
  - approval_decisions
  - evidence_assets
  - evidence_links
  - groups
  - group_memberships
  - friend_connections
  - friend_connection_sides
  - invites
  - invite_usages
  - challenges
  - challenge_participants
  - challenge_completion_events
  - notifications
  - outbox_events
  - owner_contexts
  - profile_preferences
  - rank_definitions
  - taxonomy_categories

optional_read_models_target:
  - achievement_approval_overview
  - achievement_overview
  - approval_decisions_overview
  - challenge_winners_history
  - connected_signin_methods
  - friend_connections_overview
  - group_membership_overview
  - notifications_overview
  - pending_approval_requests
  - unified_invites_overview

forbidden:
  - do not modify PostgreSQL schema
  - do not add migrations
  - do not run inspectdb
  - do not add unmanaged models
  - do not implement auth or product endpoints
  - do not modify frontend
  - do not weaken DB health checking by removing core existing tables just to pass
  - do not make optional views required unless the current dump proves they are required tables

acceptance:
  commands_without_db:
    - cd app/server && uv run python manage.py check
    - cd app/server && uv run python manage.py test
  commands_with_existing_db:
    - cd app/server && DATABASE_URL="$DATABASE_URL" uv run python manage.py achievno_check_db
  manual_checks:
    - achievno_check_db passes against the current local Podman PostgreSQL DB.
    - /health/db returns HTTP 200 when run against the current local DB.
    - The checker still fails clearly for unreachable DB or missing required tables in tests.
    - No schema changes were introduced.

output_required:
  - summary
  - changed_files
  - commands_run
  - db_check_result
  - commit_hash
  - known_gaps
  - blockers_if_any

recommended_codex_goal: >
  Implement docs/dev/contracts/F0_A2_SCHEMA_SANITY_TABLE_NAMES.yaml exactly. Fix only the A2 schema sanity object names
  to match the current PostgreSQL baseline. Do not expand scope, inspectdb, generate models, migrate, or change schema.
