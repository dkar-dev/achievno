  - personal_progress_achievements
  - friend_invites
  - friend_scoped_achievements_and_challenges
  - group_creation
  - group_roles_and_moderation
  - group_achievements
  - group_challenges
  - approval_and_evidence_flows_where_configured
  - achievement_detail_with_log_history
  - discover_groups_and_challenges
  - notifications_center
  - profile_and_settings
  - telegram_mini_app_compatible_mobile_ui
  achievement_taxonomy:
    personal:
    - done
    - with_progress
    friends:
    - done_both
    - progress_both
    - done_assign_to_friend
    - progress_assign_to_friend
    - challenge_first_wins
    - challenge_top_by_progress
    groups:
    - done_all
    - progress_all
    - done_assign_to_subgroup
    - progress_assign_to_subgroup
    - challenge_first_wins
    - challenge_done_with_history
    - challenge_top_by_progress
  achievement_attributes:
  - title
  - type
  - assignees_when_relevant
  - short_definition
  - description
  - deadline
  - area_scope
  - rank
  - progress_configuration
  - progress_logs
  - status
  achievement_statuses:
  - in_progress
  - completed
  - overdue
  - archived
  - in_review
  challenge_attributes:
  - title
  - challenge_type
  - start_date
  - end_date
  - personal_progress_view
  - leaderboard_or_winner_logic
  - rules_section
  - join
  - leave
  friend_surface_contract:
    relation_type: standalone_friend_relation
    tabs:
    - Overview
    - Achievements
    - Challenges
    overview_style: simplified_pair_view
    excluded_features:
    - roles
    - participants_list
    - group_settings
    - moderation
    - subgroup_logic
    name_or_avatar_action: open_compact_profile_with_notifications_toggle_and_remove_friend
  friend_removal_contract:
    removed_list_name: Removed Friends
    first_side_removal:
      remover_active_chat: removed
      other_side_active_chat: kept
      other_side_permissions:
      - create_new_shared_entities
      - act_in_existing_entities
      silent_to_other_side: true
    restore_flow:
      available_to_both_sides: true
      requires_acceptance: true
      reactivates_old_relation: true
      restores_old_history: true
    double_removal:
      effect: immediate_logical_destruction
      db_strategy: tombstoned_not_user_visible
  challenge_state_contract:
    user_facing_state: derived_from_dates_and_rules
    internal_lifecycle_state: true
    done_with_history_definition:
      type_class: challenge
      uses_regular_progress_logs: false
      history_model: completion_order_events
  auth_and_identity_contract:
    email_signup_requires_verification_before_access: true
    telegram_can_create_standalone_account: true
    connected_methods_ui:
      list_all_methods: true
      supported_mvp_methods:
      - email
      - telegram
      planned_next_method: google
      cannot_unlink_last_method: true
      no_primary_method_concept: true
    linking_rules:
      no_merge_in_mvp: true
      occupied_identity_behavior: show_error_and_offer_sign_in_with_existing_account
    recovery_rules:
      telegram_only_account_recovery: sign_in_with_telegram_only_until_email_or_google_is_connected
  entry_and_settings_contract:
    onboarding: none_for_mvp
    language_options:
    - en
    - ru
    appearance_options:
    - light
    - dark
    - system
    pre_auth_controls:
      language: small_corner_button
      appearance: small_corner_button
    app_admin_surface: absent_for_mvp
