        affected_current_surfaces:
        - spaces_home
        - discover_groups
        source_issue: ACH-15
        acceptance_criteria:
        - Friends are visible on Main and are not mixed with groups
        - Add Friend flow exists and can be fully exercised with mock data
        - Friend invite form supports email and link invite paths
        - Friend detail uses Overview/Achievements/Challenges and excludes group-only settings/roles/moderation
        - Removed Friends exists and Restore connection flow is navigable with mock data
        - One-sided remove and accepted restore flows are demonstrable in frontend fixtures
      FE-WS-05-personal_achievements_experience:
        priority: P0
        outcomes:
        - Achievement lists must support search, filter, and sort
        - Archived achievements must move into a separate tab near active/completed
        - Achievement cards must render final MVP fields
        - Done and progress achievement cards must have clearly different presentation
        - Completed and in-progress states must be visually distinguishable
        affected_current_surfaces:
        - personal_space
        - achievement_detail
        source_issue: ACH-19
        acceptance_criteria:
