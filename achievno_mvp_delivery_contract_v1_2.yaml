phase_contract:
  PHASE-1-FRONTEND-MVP:
    goal: Deliver the full functional frontend shape of the MVP and all explicitly requested major UI refactors before any
      DB or backend implementation starts.
    status: planned
    depends_on: []
    sources:
    - SRC-FRONTEND-CONTRACT
    - SRC-LIN-ACH-13
    - SRC-LIN-ACH-14
    - SRC-LIN-ACH-15
    - SRC-LIN-ACH-16
    - SRC-LIN-ACH-17
    - SRC-LIN-ACH-18
    - SRC-LIN-ACH-19
    - SRC-LIN-ACH-20
    - SRC-LIN-ACH-21
    - SRC-MEM-ACHIEVNO-PRODUCT
    frontend_workstreams:
      FE-WS-01-information_architecture_and_navigation:
        priority: P0
        outcomes:
        - Replace current authenticated root model based on spaces with target model Main + Groups
        - 'Main tab must contain: top search, personal block first, friend list below personal block'
        - Groups tab must contain group-related content only
        - Archive must be removed from the main screen
        - Authenticated app must gain bottom iOS-like pill navigation
        affected_current_surfaces:
        - spaces_home
        - personal_space
        - discover_groups
        - settings_home
        acceptance_criteria:
        - There is no remaining primary dependence on /app/spaces as the user-facing IA label
        - Main and Groups can be reached with one tap from authenticated root
        - Archive is no longer rendered inline on main root feed
        - Bottom pill is visible and stable on the main authenticated experience
      FE-WS-02-bottom_pill_and_settings_activity:
        priority: P0
        outcomes:
        - 'Create bottom pill actions: Notifications, Discover Groups, Create Group, Settings'
        - Move current top-right notifications/menu actions into bottom pill
        - Remove separate settings button from current menu model
        - 'Settings action must open one settings activity/sheet with entries: Profile, Notification settings, Privacy, Account,
          About, Logout, Language, Appearance'
        - Create Group must move into bottom pill
        affected_current_surfaces:
        - spaces_home
        - settings_home
        - profile_screen
        - settings_notifications
        - settings_privacy
        - settings_account
        source_issue: ACH-21
        acceptance_criteria:
        - Top-level notifications/menu buttons are not the primary navigation anymore
        - Settings is opened from bottom pill and acts as the new consolidated settings entry
        - Language and Appearance exist in the settings activity
      FE-WS-03-group_header_and_group_entry_ui:
        priority: P0
        outcomes:
        - Refactor group header to Telegram iOS-like composition
        - Remove redundant top Dev Team title row from group header layout
        - Make back button more Telegram-like in shape and placement
        - Remove trailing three-dots action from group header
        - Open group settings screen by tapping group name or avatar instead of overflow button
        - Keep target layout wider and cleaner than current implementation
        affected_current_surfaces:
        - group_detail_overview
        - group_detail_achievements
        - group_detail_challenges
        source_issue: ACH-21
        acceptance_criteria:
        - Group header no longer depends on trailing three-dot overflow
        - Tapping name or avatar enters group settings surface
        - Group top region matches the intended Telegram-like visual direction
      FE-WS-04-friends_surface:
        priority: P0
        outcomes:
        - Introduce friends as a first-class surface in Main
        - Add explicit Add Friend entry point
        - Friend invite UI must support email input and copy-link invite
        - Friends must render as people rows under personal block, not as group cards
        - Friend-scoped surfaces must support achievements and challenges flows
        - Friend detail must use Overview/Achievements/Challenges tabs, not a mini-group or generic chat-only screen
        - Friend Overview must be simplified for one-to-one context
        - Tapping friend name or avatar must open compact profile with notifications toggle and remove-friend action
        - Removed Friends section must exist for one-sided removals
