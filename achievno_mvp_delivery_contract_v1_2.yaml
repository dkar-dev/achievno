        - Notifications must support special invite card structures and social activity states
        - Notification center must remain reachable from bottom pill
        affected_current_surfaces:
        - discover_groups
        - discover_challenges
        - notifications_center
        acceptance_criteria:
        - Discover supports search and target surfaces for groups and challenges
        - Invite notifications are actionable in UI shape
        - Notifications are not stranded behind deprecated top-right-only buttons
      FE-WS-11-profile_and_settings_retention:
        priority: P1
        outcomes:
        - Preserve profile/account/privacy/notification/about surfaces as support surfaces
        - Re-home them under new settings activity instead of old current page graph
        - Add Language and Appearance entries
        - Expose connected sign-in methods list in settings/account surfaces
        - Block unlinking of the last remaining sign-in method
        - No dedicated onboarding flow may be introduced in MVP scope
        affected_current_surfaces:
        - profile_screen
        - settings_home
        - settings_notifications
        - settings_privacy
        - settings_account
        source_issue: ACH-21
        acceptance_criteria:
        - All previous support surfaces remain reachable after nav refactor
        - Language and Appearance exist in settings
        - Settings displays connected sign-in methods and their connection state
        - Attempting to unlink the last remaining sign-in method is blocked in UI
      FE-WS-12-major_ui_corrections_already_flagged:
        priority: P0
        outcomes:
        - Fix segmented slider overlap on group page tabs
        - Center-align stats card text
        - Improve contrast/readability of metadata under progress bars
        - Remove duplicate create buttons on Personal and keep one primary bottom FAB
        - Differentiate Archived vs In Progress more clearly, likely with blue for In Progress
        - Fix group achievements/challenges stats text overflow and centering
        affected_current_surfaces:
        - group_detail_overview
        - group_detail_achievements
        - group_detail_challenges
        - personal_space
        source_memory: SRC-MEM-ACHIEVNO-PRODUCT
        acceptance_criteria:
        - No tab overlap remains in group segmented control
        - Text in stats cards does not overflow card bounds
        - Only one primary create-achievement button remains in Personal
        - Archived and In Progress are distinguishable at a glance
      FE-WS-13-auth_identity_and_entry_experience:
        priority: P0
        outcomes:
        - Email sign-up must end in verification gate before product access
        - Telegram must be able to create a standalone account path in MVP UI
        - Pre-auth language and appearance controls must exist as small corner buttons
        - Connected sign-in methods list must exist in settings
        - No account-merge flow is introduced in MVP
        - No onboarding flow is introduced in MVP
        affected_current_surfaces:
        - welcome_guest
        - auth_sign_up
        - auth_sign_in
        - settings_account
        - settings_home
        acceptance_criteria:
        - A newly signed-up email account cannot reach main product before verification succeeds
        - Telegram-created accounts can later see connected methods UI
        - Language and appearance can be changed before auth through subtle corner controls
        - There is no onboarding blocker between successful auth and product access
    frontend_delivery_constraints:
      mocking_policy: Allowed and expected for PHASE-1
      api_dependency: No real API dependency required during PHASE-1
      required_output:
      - updated frontend route map
      - updated screen inventory
      - all major user flows navigable with mock data
      - explicit UI contracts for backend payloads
      task_granularity: screen_or_surface_by_default
      screen_task_policy: Prefer one bounded task per screen/surface while it remains reviewable by Codex.
      shared_ui_refactor_policy: Refactor shared UI only when necessary for the current screen task and keep the refactor
        bounded.
      completion_gate: No PHASE-1 step is accepted until the implemented screen matches YAML and its Linear issue.
  PHASE-2-DATABASE:
    goal: Design and implement the full MVP database contract after frontend flows are fixed and before backend implementation.
    status: planned
    depends_on:
    - PHASE-1-FRONTEND-MVP
    sources:
    - SRC-LIN-ACH-9
    - SRC-LIN-ACH-10
    - SRC-LIN-ACH-11
    - SRC-LIN-ACH-12
    - SRC-LIN-ACH-15
    - SRC-LIN-ACH-16
    - SRC-LIN-ACH-17
    - SRC-LIN-ACH-18
    - SRC-LIN-ACH-19
    - SRC-LIN-ACH-20
    - SRC-MEM-ACHIEVNO-PRODUCT
    - SRC-KP-2026-DOC
    database_stack:
      engine: PostgreSQL 16+
      extensions:
      - pgcrypto
      - citext
      - pg_trgm
      migration_tool: Alembic
      orm_integration_target: SQLAlchemy 2.x
      sql_style: explicit_schema_first
      naming_conventions:
        primary_keys: pk_<table>
        foreign_keys: fk_<table>__<column>__<ref_table>
        unique_constraints: uq_<table>__<column_set>
        indexes: ix_<table>__<column_set>
        check_constraints: ck_<table>__<rule>
    database_design_decisions:
    - Use UUID primary keys generated via gen_random_uuid()
    - Use timestamptz for all temporal columns
    - Use soft delete only where product recovery matters; otherwise use explicit status fields
    - Keep achievements and challenges as separate tables; do not force one polymorphic mega-table
    - Keep permissions role-based through membership rows; do not introduce ABAC for MVP
    - Store heavy files outside PostgreSQL; keep only metadata in DB
    - Use DB constraints for invariants where practical, application services for cross-aggregate rules
    - Use context ownership model with dedicated friend_connection lifecycle; friend is a standalone relation, not a group
      alias.
    - Stored procedures or PostgreSQL-equivalent SQL functions, triggers, and views are mandatory due to coursework constraints.
    - Database roles, privileges, and protection mechanisms are mandatory deliverables due to coursework constraints.
    - 'Keep DB logic hybrid: invariants and data-side automation in PostgreSQL, orchestration and API scenario logic in FastAPI.'
    - Database is designed from zero on PostgreSQL; no MySQL migration path is required.
    - Database owns invariants and data-side automation; FastAPI owns application orchestration and broader business flows.
    - Coursework-mandated procedures/functions, triggers, views, roles/privileges, and DB protection are mandatory outputs
      rather than optional enhancements.
    logical_model:
      lookup_tables:
        areas:
          purpose: System-defined category/area catalog for user preferences, groups, and items
          columns:
          - id
          - code
          - label
          - sort_order
          - is_active
          constraints:
          - unique(code)
        rank_definitions:
          purpose: Rank catalog for system, user, or space-specific rank sets
          columns:
          - id
          - scope_type
          - scope_user_id
          - scope_space_id
          - code
          - label
          - sort_order
          - color_token
          - is_active
          constraints:
          - unique(scope_type, scope_user_id, scope_space_id, code)
          - scope_user_id required when scope_type=user
          - scope_space_id required when scope_type=space
      identity_and_user_tables:
        users:
          purpose: Core account and profile record
          columns:
          - id
          - email
          - email_normalized
          - email_verified_at
          - password_hash
          - display_name
          - username
          - avatar_url
          - bio
          - language_code
          - appearance
          - status
          - created_at
          - updated_at
          - deleted_at
          constraints:
          - unique(email_normalized) where email_normalized is not null
          - unique(username) where username is not null
          - email/password fields may be null for standalone telegram-origin accounts
          - at least one sign-in method must exist at account level
          indexes:
          - email_normalized
          - username
          - status
        user_external_identities:
          purpose: Linked external sign-in identities such as Telegram and Google
          columns:
          - id
          - user_id
          - provider
          - provider_user_id
          - provider_username
          - provider_payload_json
          - linked_at
          constraints:
          - unique(provider, provider_user_id)
          - provider in (telegram, google)
          indexes:
          - user_id
          - provider
        user_sessions:
          purpose: Refresh/session tracking for web and mini-app auth continuity
          columns:
          - id
          - user_id
          - refresh_token_hash
          - user_agent
          - ip_address
          - created_at
          - last_seen_at
          - expires_at
          - revoked_at
          constraints:
          - unique(refresh_token_hash)
          indexes:
          - user_id
          - expires_at
          - revoked_at
        user_area_preferences:
          purpose: User interests for recommendations and profile preferences
          columns:
          - user_id
          - area_id
          - weight
          - created_at
          constraints:
          - primary key(user_id, area_id)
          indexes:
          - area_id
        email_verification_tokens:
          purpose: Verification tokens for email-based account activation gate
          columns:
          - id
          - user_id
          - email
          - token_hash
          - expires_at
          - used_at
          - created_at
          constraints:
          - unique(token_hash)
          indexes:
          - user_id
          - expires_at
          - used_at
      space_tables:
        spaces:
          purpose: Technical context owner for personal, friend, and group read models; friend semantics are governed by dedicated
            friend_connection tables.
          columns:
          - id
          - type
          - owner_user_id
          - title
          - description
          - visibility
          - area_id
          - avatar_url
          - avatar_bg_token
          - status
          - created_at
          - updated_at
          - archived_at
          constraints:
          - type in (personal, friend, group)
          - owner_user_id required for personal and group where creator ownership applies
          - friend contexts must be backed by exactly one friend_connections row
          indexes:
          - type
          - owner_user_id
          - visibility
          - area_id
          - status
        space_members:
          purpose: Membership, role, and per-space member settings for personal/group contexts and technical participant mapping
            where needed
          columns:
          - space_id
          - user_id
          - role
          - membership_status
          - notifications_enabled
          - joined_at
          - left_at
          - invited_by_user_id
          - created_at
          - updated_at
          constraints:
          - primary key(space_id, user_id)
          indexes:
          - user_id
          - role
          - membership_status
        space_invites:
          purpose: Invite records for friend and group contexts
          columns:
          - id
          - space_id
          - invite_type
          - target_user_id
          - target_email
          - invite_token
          - invited_by_user_id
          - status
          - expires_at
          - accepted_at
          - created_at
          constraints:
          - invite_type in (internal_user, email, link)
          indexes:
          - space_id
          - target_user_id
          - target_email
          - status
          - invite_token
        space_join_requests:
          purpose: Public-group join requests when group is discoverable but moderated
          columns:
          - id
          - space_id
          - requester_user_id
          - status
          - message
          - reviewed_by_user_id
          - reviewed_at
          - created_at
          indexes:
          - space_id
          - requester_user_id
          - status
      achievement_tables:
        achievements:
          purpose: Achievement aggregate root
          columns:
          - id
          - space_id
          - created_by_user_id
          - base_type
          - assignment_mode
          - title
          - short_definition
          - description
          - area_id
          - rank_id
          - status
          - deadline_at
          - progress_current
          - progress_target
          - unit_label
          - allow_negative_progress
          - approval_policy_id
          - completed_at
          - archived_at
          - created_at
          - updated_at
          constraints:
          - base_type in (done, progress)
          - status in (in_progress, completed, overdue, archived, in_review)
          - progress_target required when base_type=progress
          indexes:
          - space_id
          - status
          - deadline_at
          - area_id
          - rank_id
          - created_by_user_id
        achievement_assignees:
          purpose: Explicit assignee list for friend/group achievements
          columns:
          - achievement_id
          - user_id
          - can_log_progress
          - can_complete
          - assigned_by_user_id
          - assigned_at
          constraints:
          - primary key(achievement_id, user_id)
          indexes:
          - user_id
        achievement_logs:
          purpose: User-visible log history for achievements
          columns:
          - id
          - achievement_id
          - actor_user_id
          - action_type
          - delta_value
          - resulting_progress
          - note
          - created_at
          indexes:
          - achievement_id
          - actor_user_id
          - action_type
          - created_at
      challenge_tables:
        challenges:
          purpose: Challenge aggregate root
          columns:
          - id
          - space_id
          - created_by_user_id
          - challenge_type
          - title
          - short_definition
          - description
          - rules_text
          - area_id
          - rank_id
          - start_at
          - end_at
          - progress_target
          - unit_label
          - lifecycle_state
          - winner_user_id
          - created_at
          - updated_at
          - archived_at
          constraints:
          - challenge_type in (first_wins, top_by_progress, done_with_history)
          indexes:
          - space_id
          - challenge_type
          - start_at
          - end_at
          - lifecycle_state
          - winner_user_id
        challenge_participants:
          purpose: Join/leave and current progress state per user
          columns:
          - challenge_id
          - user_id
          - state
          - current_progress
          - current_rank
          - joined_at
          - left_at
          - completed_at
          - winner_position
          constraints:
          - primary key(challenge_id, user_id)
          indexes:
          - user_id
          - state
          - current_rank
        challenge_completion_events:
          purpose: Minimal history table for done_with_history challenges without turning challenges into achievement-log
            clones
          columns:
          - id
          - challenge_id
          - user_id
          - event_type
          - payload_json
          - created_at
          indexes:
          - challenge_id
          - user_id
          - event_type
          - created_at
      approval_and_evidence_tables:
        approval_policies:
          purpose: Optional review/evidence requirement policy
          columns:
          - id
          - space_id
          - mode
          - min_approvals
          - require_evidence
          - allowed_approver_scope
          - created_by_user_id
          - created_at
          - updated_at
          indexes:
          - space_id
          - mode
          - allowed_approver_scope
        approval_policy_approvers:
          purpose: Explicit allowed approver set when scope=selected_users
          columns:
          - policy_id
          - user_id
          constraints:
          - primary key(policy_id, user_id)
        achievement_reviews:
          purpose: Review records for completion/proof approval
          columns:
          - id
          - achievement_id
          - submitted_by_user_id
          - reviewer_user_id
          - status
          - comment
          - created_at
          - decided_at
          indexes:
          - achievement_id
          - submitted_by_user_id
          - reviewer_user_id
          - status
        evidence_assets:
          purpose: Metadata for uploaded files stored outside PostgreSQL
          columns:
          - id
          - owner_user_id
          - storage_provider
          - storage_key
          - file_name
          - mime_type
          - size_bytes
          - checksum_sha256
          - created_at
          indexes:
          - owner_user_id
          - storage_key
          - checksum_sha256
        evidence_links:
          purpose: Attach uploaded assets to logs or review submissions
          columns:
          - id
          - target_kind
          - target_id
          - asset_id
          - caption
          - created_at
          indexes:
          - target_kind
          - target_id
          - asset_id
      social_and_support_tables:
        comments:
          purpose: Comments on achievements and optionally challenges if enabled
          columns:
          - id
          - target_kind
          - target_id
          - author_user_id
          - body
          - created_at
          - updated_at
          - deleted_at
          indexes:
          - target_kind
          - target_id
          - author_user_id
          - created_at
        notifications:
          purpose: In-app notification inbox
          columns:
          - id
          - user_id
          - type
          - title
          - body
          - action_url
          - payload_json
          - is_read
          - created_at
          - read_at
          indexes:
          - user_id
          - is_read
          - type
          - created_at
        outbox_events:
          purpose: Background delivery queue for notifications, emails, and asynchronous side effects
          columns:
          - id
          - event_type
          - aggregate_type
          - aggregate_id
          - payload_json
          - status
          - available_at
          - attempt_count
          - last_error
          - created_at
          - processed_at
          indexes:
          - status
          - available_at
          - event_type
          - aggregate_type
          - aggregate_id
      friend_tables:
        friend_connections:
          purpose: Canonical standalone 1-on-1 relation between exactly two users; not a group alias
          columns:
          - id
          - space_id
          - user_a_id
          - user_b_id
          - state
          - created_at
          - updated_at
          - tombstoned_at
          constraints:
          - unique(sorted_user_pair(user_a_id, user_b_id))
          - user_a_id != user_b_id
          - state in (active, one_sided_removed, tombstoned)
          indexes:
          - space_id
          - user_a_id
          - user_b_id
          - state
          - tombstoned_at
        friend_connection_sides:
          purpose: Per-side visibility and notification state for asymmetric friend removal/restore behavior
          columns:
          - friend_connection_id
          - user_id
          - side_state
          - notifications_enabled
          - removed_at
          - updated_at
          constraints:
          - primary key(friend_connection_id, user_id)
          - side_state in (active, removed)
          indexes:
          - user_id
          - side_state
          - removed_at
        friend_restore_invites:
          purpose: Restore-connection invitations for previously removed friend links
          columns:
          - id
          - friend_connection_id
          - initiated_by_user_id
          - recipient_user_id
          - status
          - expires_at
          - created_at
          - responded_at
          constraints:
          - status in (pending, accepted, declined, expired)
          indexes:
          - friend_connection_id
          - recipient_user_id
          - status
          - expires_at
    database_constraints_and_invariants:
    - Each user must have exactly one personal space
    - Friend spaces must contain exactly two active members after invite acceptance
    - Personal spaces must not create achievement_assignees rows
    - Group and friend achievements may require explicit assignees depending on assignment_mode
    - Only group spaces may have admin role
    - Challenge participants must belong to the parent space membership set
    - Approval review rows are only valid for achievements that reference an approval_policy
    - Evidence links must only point to allowed target kinds
    seed_strategy:
      required_seed_types:
      - areas
      - system_rank_definitions
      - demo_users
      - personal_spaces
      - friend_spaces
      - group_spaces
      - achievements
      - challenges
      - notifications
      mock_data_target: enough data to exercise all MVP flows on staging and local development
      linear_alignment:
      - ACH-11
    procedure_policy:
      position: mandatory_due_to_coursework_constraint
      architecture_rule: Use meaningful database-side procedures/functions, triggers, and views for data-side automation,
        protection, and reporting; do not move all application orchestration into the database.
      mandatory_db_artifacts:
      - stored_procedures_or_postgresql_equivalent_functions
      - triggers
      - views
      - roles_and_privileges
      - database_protection_description
      preferred_db_side_responsibilities:
      - updated_at helpers
      - password or credential safety helpers when justified
      - invite token or verification token helpers when justified
      - audit and history maintenance
      - consistency-preserving status or counter maintenance
      - reporting views for coursework and admin scenarios
    required_database_outputs:
    - formal_logical_description_for_every_table
    - relationship_schema
    - ER model
    - Alembic migration chain
    - seed scripts and mock json sources
    - constraint list
    - index list
    - database role and privilege matrix
    - database protection design
    - procedure_or_function_catalog
    - trigger_catalog
    - view_catalog
    - test fixtures
    - appendix_ready_sql_listings
    - DB contract document aligned with frontend payload needs
    coursework_alignment:
      mandatory: true
      required_sections_supported_by_phase:
      - logical_database_structure
      - administration
      - database_protection
      - stored_procedures_triggers_views
      - appendix_ready_sql_artifacts
      rule: No DB design deviation from the coursework requirements is allowed, except using PostgreSQL from scratch instead
        of MySQL migration.
  PHASE-3-BACKEND:
    goal: Implement the server side strictly on top of the approved frontend contract and approved database design.
    status: planned
    depends_on:
    - PHASE-2-DATABASE
    sources:
    - SRC-LIN-ACH-15
    - SRC-LIN-ACH-16
    - SRC-LIN-ACH-17
    - SRC-LIN-ACH-18
    - SRC-LIN-ACH-19
    - SRC-LIN-ACH-20
    - SRC-LIN-ACH-21
    - SRC-MEM-ACHIEVNO-PRODUCT
    - SRC-KP-2026-DOC
    backend_stack:
      framework: FastAPI
      data_validation: Pydantic v2
      orm: SQLAlchemy 2.x
      postgres_driver: asyncpg
      migrations: Alembic
      authentication: short_lived_access_token_plus_rotating_refresh_session
      password_hashing: Argon2id
      file_storage: S3_compatible_adapter_with_local_dev_fallback
      background_processing: app_worker_using_postgres_outbox
      test_stack:
      - pytest
      - pytest-asyncio
      - httpx
      - factory-style fixtures
      deployment_shape: single modular monolith API + worker process
    backend_architecture:
      style: modular_monolith
      repo_shape:
      - app/api/v1
      - app/core
      - app/domain
      - app/models
      - app/repositories
      - app/services
      - app/workers
      - app/schemas
      - app/tests
      - alembic
      module_boundaries:
      - auth
      - users
      - spaces
      - invites
      - achievements
      - challenges
      - approvals
      - evidence
      - notifications
      - discover
      - settings
      - friends
      - account_linking
      forbidden_architecture_moves:
      - no_microservices_for_mvp
      - no_generic_frameworkless_mega-service
      - no_db_procedure_first_business_logic
      - no_graphql_as_primary_api
      tracking_policy: Linear backend work follows product features with design_notes and tasks.
      modularity_statement: Implementation is a modular monolith; exact structural patterns and domain module breakdown may
        be detailed later without breaking the current phase order.
    service_contracts:
      BE-SVC-01-auth_and_identity:
        priority: P0
        responsibilities:
        - email signup with mandatory verification gate before product access
        - email signin
        - email verification
        - session refresh
        - logout
        - telegram standalone sign-in/up
        - connected sign-in method linking and unlinking
        - me endpoint
        - enforce no-merge policy and no-unlink-last-method rule
        minimal_endpoints:
        - POST /api/v1/auth/sign-up
        - POST /api/v1/auth/sign-in
        - POST /api/v1/auth/verify-email
        - POST /api/v1/auth/refresh
        - POST /api/v1/auth/sign-out
        - POST /api/v1/auth/telegram/sign-in
        - POST /api/v1/auth/methods/link/email
        - POST /api/v1/auth/methods/link/google
        - DELETE /api/v1/auth/methods/{method_id}
        - GET /api/v1/auth/me
      BE-SVC-02-main_and_spaces:
        priority: P0
        responsibilities:
        - serve Main overview payload
        - serve Groups list payload
        - serve group details
        - serve friend rows and friend one-to-one summaries
        - serve Removed Friends list
        - map frontend context to personal/friend/group payloads without treating friend as group settings surface
        minimal_endpoints:
        - GET /api/v1/main
        - GET /api/v1/groups
        - GET /api/v1/groups/{space_id}
        - GET /api/v1/friends
        - GET /api/v1/friends/{connection_id}
        - GET /api/v1/friends/removed
      BE-SVC-03-invites_and_membership:
        priority: P0
        responsibilities:
        - friend invite by email
        - friend invite by link
        - group invite by internal user/email/link
        - accept/decline/revoke invite
        - join request handling for public groups
        - friend restore-connection invite
        - accept/decline restore connection
        minimal_endpoints:
        - POST /api/v1/friends/invites/email
        - POST /api/v1/friends/invites/link
        - POST /api/v1/groups/{space_id}/invites
        - POST /api/v1/invites/{invite_id}/accept
        - POST /api/v1/invites/{invite_id}/decline
        - POST /api/v1/groups/{space_id}/join-requests
        - POST /api/v1/friends/{connection_id}/restore
        - POST /api/v1/friends/restore-invites/{invite_id}/accept
        - POST /api/v1/friends/restore-invites/{invite_id}/decline
      BE-SVC-04-group_management_and_rbac:
        priority: P0
        responsibilities:
        - create/update group
        - group membership listing
        - role changes
        - base permission configuration
        - member settings
        - group settings activity payload
        minimal_endpoints:
        - POST /api/v1/groups
        - PATCH /api/v1/groups/{space_id}
        - GET /api/v1/groups/{space_id}/members
        - PATCH /api/v1/groups/{space_id}/members/{user_id}
        - GET /api/v1/groups/{space_id}/settings
        - PATCH /api/v1/groups/{space_id}/settings
      BE-SVC-05-achievements:
        priority: P0
        responsibilities:
        - list achievements with search/filter/sort
        - create achievements for all supported contexts
        - achievement detail
        - achievement logs
        - log progress
        - complete
        - archive
        - review submission state transitions
        minimal_endpoints:
        - GET /api/v1/spaces/{space_id}/achievements
        - POST /api/v1/spaces/{space_id}/achievements
        - GET /api/v1/achievements/{achievement_id}
        - PATCH /api/v1/achievements/{achievement_id}
        - POST /api/v1/achievements/{achievement_id}/log
        - POST /api/v1/achievements/{achievement_id}/complete
        - POST /api/v1/achievements/{achievement_id}/archive
        - GET /api/v1/achievements/{achievement_id}/logs
      BE-SVC-06-challenges:
        priority: P0
        responsibilities:
        - list challenges
        - create challenge variants
        - challenge detail payload
        - join/leave flows
        - progress update for applicable challenge types
        - leaderboard payload
        minimal_endpoints:
        - GET /api/v1/spaces/{space_id}/challenges
        - POST /api/v1/spaces/{space_id}/challenges
        - GET /api/v1/challenges/{challenge_id}
        - POST /api/v1/challenges/{challenge_id}/join
        - POST /api/v1/challenges/{challenge_id}/leave
        - POST /api/v1/challenges/{challenge_id}/progress
        - GET /api/v1/challenges/{challenge_id}/leaderboard
      BE-SVC-07-approvals_and_evidence:
        priority: P0
        responsibilities:
        - approval policy configuration
        - review request submission
        - approve/reject actions
        - evidence metadata upload handshake
        - asset linkage to logs/reviews
        minimal_endpoints:
        - POST /api/v1/achievements/{achievement_id}/reviews
        - POST /api/v1/reviews/{review_id}/approve
        - POST /api/v1/reviews/{review_id}/reject
        - POST /api/v1/evidence/upload-prepare
        - POST /api/v1/evidence/upload-complete
      BE-SVC-08-notifications_and_discover:
        priority: P1
        responsibilities:
        - notification inbox
        - mark as read
        - mark all read
        - discover groups
        - discover challenges
        - simple category-based ranking for discover
        minimal_endpoints:
        - GET /api/v1/notifications
        - POST /api/v1/notifications/{notification_id}/read
        - POST /api/v1/notifications/read-all
        - GET /api/v1/discover/groups
        - GET /api/v1/discover/challenges
      BE-SVC-09-profile_and_settings:
        priority: P1
        responsibilities:
        - profile read/update
        - notification preferences
        - privacy settings
        - account settings
        - language
        - appearance
        - connected sign-in methods list
        - linkable-method status payload
        minimal_endpoints:
        - GET /api/v1/me/profile
        - PATCH /api/v1/me/profile
        - GET /api/v1/me/settings
        - PATCH /api/v1/me/settings
        - GET /api/v1/me/privacy
        - PATCH /api/v1/me/privacy
        - GET /api/v1/me/notifications-settings
        - PATCH /api/v1/me/notifications-settings
        - GET /api/v1/me/auth-methods
        - PATCH /api/v1/me/language
        - PATCH /api/v1/me/appearance
    backend_cross_cutting_requirements:
      authorization_model: space_type_plus_role_plus_item_policy
      idempotency:
      - invite acceptance
      - join challenge
      - leave challenge
      - mark notification read
      - progress log submission via client retry token
      validation_rules:
      - do not allow challenge participation outside parent space membership
      - do not allow approval actions by users outside allowed approver scope
      - do not allow progress subtraction below zero unless explicitly allowed and business rule permits
      - do not allow archive/complete state transitions that contradict current state machine
      - do not grant main product access to unverified email-signup accounts
      - do not auto-merge accounts when linking an occupied email or external identity
      - do not allow unlinking the last remaining sign-in method
      - friend double-removal must tombstone shared 1-on-1 history immediately at product level
      background_jobs:
      - notification fanout
      - email invite delivery
      - cleanup of expired invites
      - optional digest or reminder jobs later
      - email verification delivery
      observability:
      - structured logs
      - request_id propagation
      - domain event logging
      - health endpoint
      - readiness endpoint
    required_backend_outputs:
    - API route inventory
    - Pydantic schema inventory
    - SQLAlchemy model inventory
    - permission matrix
    - outbox worker
    - integration tests
    - OpenAPI spec aligned with final frontend payloads
  PHASE-4-POLISH:
    goal: After backend integration, finish remaining frontend and design polish without changing approved MVP scope.
    status: planned
    depends_on:
    - PHASE-3-BACKEND
    polish_workstreams:
      POL-01-desktop_stabilization:
        priority: P1
        items:
        - desktop layout sanity pass
        - desktop interaction regressions
        - responsive edge-case fixes
      POL-02-telegram_mini_app_polish:
        priority: P1
        items:
        - theme handling
        - fullscreen behavior
        - button override polish
        - home-screen/add-to-home-screen behavior clarification
      POL-03-frontend_regression_cleanup:
        priority: P1
        items:
        - interaction regressions after API integration
        - loading states
        - empty states
        - error states
        - animation and spacing consistency
      POL-04-remaining_visual_details:
        priority: P2
        items:
        - fine typography and spacing tuning
        - final icon alignment
        - final status color tuning
        - final contrast pass
    scope_rule: No new product pillars may be added in PHASE-4. Only stabilization and polish are allowed.
api_and_payload_strategy:
  payload_shape_policy:
  - Frontend-first payload contracts must be fixed before backend implementation
  - Each major screen family must have one documented aggregate payload
  - Avoid chatty N+1 mobile APIs; prefer aggregated read models per screen
  - Keep write APIs explicit and narrow
  suggested_read_models:
  - MainScreenPayload
  - GroupsTabPayload
  - FriendSpacePayload
  - GroupOverviewPayload
  - AchievementListPayload
  - AchievementDetailPayload
  - ChallengeDetailPayload
  - SettingsActivityPayload
  - NotificationsPayload
  - DiscoverGroupsPayload
  - DiscoverChallengesPayload
  - RemovedFriendsPayload
  - ConnectedMethodsPayload
  - AuthVerificationGatePayload
  - FriendCompactProfilePayload
acceptance_definition:
  mvp_done_when:
  - A user can create and complete personal achievements with history
  - A user can invite a friend and run friend-scoped achievements or challenges
  - A user can create or join a group, manage membership roles, and participate in group achievements and challenges
  - Approval and evidence flows work where configured
  - Main/Groups navigation and bottom pill are fully functional
  - Discover and notifications are functional enough to support social loops
  - Web and Telegram Mini App share one coherent mobile-first experience
  - Email sign-up is blocked from main product access until verification succeeds
  - Telegram can create a standalone account and connected sign-in methods are visible in settings
  - Friend 1-on-1 surface works with Overview/Achievements/Challenges and Removed Friends restore semantics
  - Language and appearance controls work both before auth and inside settings
  not_done_when:
  - friends are still absent as first-class product surface
  - archive still lives only as an inline legacy reveal on main root
  - group navigation/settings are still split across old menu patterns
  - backend API shape forces a redesign of approved frontend flows
  - email sign-up still bypasses verification gate into the product
  - friend remove/restore lifecycle is missing or behaves like simple hard delete on first removal
  - language and appearance are unavailable before auth
resolved_issues:
- id: OI-001
  title: Friend detail screen model
  status: resolved
  resolution: Friend uses standalone 1-on-1 surface with Overview/Achievements/Challenges, simplified Overview, no group roles/settings/moderation.
- id: OI-002
  title: Challenge done_with_history vs no progress logs
  status: resolved
  resolution: done_with_history remains a challenge and uses completion-order history events instead of regular achievement
    progress logs.
- id: OI-003
  title: Challenge lifecycle state
  status: resolved
  resolution: User-facing challenge state remains derived from dates/rules, but backend keeps internal lifecycle_state.
- id: OI-004
  title: Email verification
  status: resolved
  resolution: Email sign-up is blocked by hard verification gate before main product access.
- id: OI-005
  title: Telegram/email linking
  status: resolved
  resolution: Telegram can create standalone account; linked methods are optional; no merge in MVP; occupied identities produce
    error plus sign-in suggestion.
- id: OI-007
  title: DB procedures justification
  status: resolved
  resolution: Procedures/functions, triggers, views, roles, and DB protection are mandatory because the coursework document
    is axiomatic; DB-side logic stays hybrid, not all-in-DB.
- id: OI-009
  title: Creation wizard taxonomy mismatch
  status: resolved
  resolution: Context is inferred from entry surface; no generic Personal/Friend/Group or Achievement/Challenge question;
    show concrete contextual creation options.
- id: OI-006
  title: Frontend-first sequencing increases rework risk for DB/API contracts
  status: resolved
  resolution: Accepted as a fixed project rule; mitigated by frozen PHASE-1 payload contracts, YAML priority over implementation,
    and a ban on backend-led redesign of approved frontend flows.
- id: OI-008
  title: Backend technical backlog is not explicitly decomposed in Linear
  status: resolved
  resolution: 'Resolved by governance: backend tracking uses product features plus tasks plus design notes with multi-area
    tags; backend Linear issues will be generated directly from YAML when PHASE-3 is reached.'
immediate_actions:
- id: ACT-001
  what: Use this YAML v1.2.0 as the only source of truth for future planning and reviews
  why: The contract is now closed and no longer depends on unresolved OI handling.
- id: ACT-002
  what: When a new execution step is needed, derive it from YAML first and then create the corresponding Linear issue
  why: The agreed delivery loop is YAML -> Linear -> Codex -> Review -> Fix/Next.
- id: ACT-003
  what: Keep frontend implementation tasks screen-based by default
  why: This matches the agreed task granularity and keeps Codex work reviewable.
- id: ACT-004
  what: When PHASE-3 begins, generate backend Linear features and subissues directly from the backend section of this YAML
  why: Backend tracking is now contract-defined even if the current Linear tree is still sparse.
execution_loop:
  source_of_truth: yaml_contract
  review_authority: chatgpt_review_against_yaml_and_linear_task
  implementer: codex
  task_queue: linear
  loop:
  - read_yaml_and_select_next_step
  - create_or_update_linear_issue_for_that_step
  - user_feeds_issue_to_codex
  - codex_implements_and_pushes_to_repo
  - chatgpt_reviews_result_against_yaml_and_issue
  - if_not_ok_create_fix_and_repeat_same_step
  - if_ok_move_to_next_yaml_step
  move_forward_rule: No next step may start until the current step is accepted or fixed.
  task_sizing_rule: A task may combine several tightly connected steps if they remain inside one phase and one status and
    still form one reviewable bounded contract.
  frontend_task_granularity: by_screen_or_surface_by_default
  frontend_screen_task_shape: one_screen_task_may_include_layout_navigation_content_states_actions_modals_and_required_local_integration
  shared_component_refactor_policy: Allowed inside the same screen task only when required to make that screen correct; avoid
    broad cross-app refactors unless YAML creates a dedicated task.
linear_governance:
  issue_model:
    feature:
      meaning: user_scenario_or_vertical_product_slice
      template_sections:
      - Что делаем
      - Зачем
      - Готово, если
      - Ограничения / зависимости
      - Ссылки
    task:
      meaning: bounded_implementation_subissue_inside_feature
      template_sections:
      - Что сделать
      - Готово, если
    design_notes:
      meaning: design_discussion_decisions_and_open_questions
      template_sections:
      - Нужно решить
      - Принятые решения
      - Открытые вопросы
  area_model:
    field_type: multi_value
    allowed_values:
    - frontend
    - backend
    - db
    - infra
    - docs
    - ci/cd
    multiple_values_allowed: true
  backend_tracking_policy:
    tracking_shape: product_feature_plus_tasks_plus_design_notes
    not_by_pure_technical_layer_only: true
    recommended_backend_feature_families:
    - auth_and_identity
    - friends
    - groups
    - achievements
    - challenges
    - notifications
    - settings_and_connected_methods
    - integrations
  frontend_tracking_policy:
    default_unit: screen_or_surface
    do_not_split_screen_unnecessarily: true
contract_closure:
  open_issues_remaining: 0
  status: closed_contract_ready_for_execution
  notes: Further changes are allowed only through explicit YAML updates after discussion.
