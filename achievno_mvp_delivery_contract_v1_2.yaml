        - Archive is no longer only an inline reveal block
        - Card state differences are visible without opening detail view
      FE-WS-06-achievement_detail_and_progress_modal:
        priority: P0
        outcomes:
        - Achievement detail must show compact top card view, expandable description, log history, deadline, and bottom action
          bar
        - Progress logging bottom sheet must support future bar preview
        - Progress logging must support quick add, custom value, note, save, save and complete
        - Negative progress values must be supported
        - Quick-add values must adapt to target size
        affected_current_surfaces:
        - achievement_detail
        source_issue: ACH-19
        acceptance_criteria:
        - Log history is visible in detail page
        - Progress modal supports subtract mode
        - Quick-add button values are not static across all achievements
      FE-WS-07-creation_flows_unification:
        priority: P0
        outcomes:
        - Use existing wizard as baseline instead of designing from zero
        - Align creation wizard with final taxonomy for personal, friends, and groups
        - Unify creation entry location across contexts
        - Keep bottom-right floating primary create action as the default daily-use entry
        - Make create action available from overview where relevant
        - Redesign mobile stepper into a centered and readable pill-like component
        - Resolve semantic conflict between create plus and quick-progress plus
        - Do not ask Personal/Friend/Group explicitly in wizard; context must come from entry surface
        - Do not present generic Achievement/Challenge split as the main first step; present concrete options for the current
          context
        affected_current_surfaces:
        - personal_space
        - group_detail_achievements
        - group_detail_challenges
        - group_detail_overview
        source_issue: ACH-20
        acceptance_criteria:
        - Creation flows exist for all required personal/friend/group variants using mock data
        - Wizard top stepper is mobile-safe and visually balanced
        - There is one clearly primary create control pattern across contexts
        - Personal/Friend/Group context is inferred from current surface rather than selected manually
        - Friend and Group flows expose concrete contextual type options immediately
      FE-WS-08-group_moderation_and_invites_ui:
        priority: P0
        outcomes:
        - Expose group visibility, category, roles, base permission, and invite mechanics in frontend flows
        - Invite flow must support choosing friends, entering emails, and copy link
        - Role-based settings screens must differ for owner, admin, and member
