coursework_constraints:
  source: SRC-KP-2026-DOC
  rule: document_is_axiom
  mandatory_report_sections:
  - subject_domain_analysis
  - task_statement_and_detailed_problem_description
  - solution_means
  - logical_relational_database_structure
  - database_administration
  - use_case_diagram
  - database_protection
  - stored_procedures_triggers_and_views
  - system_structure
  - user_instruction
  - appendix_a_created_tables
  - appendix_b_procedures_triggers_views
  - appendix_c_client_application_listing
  mandatory_database_artifacts:
  - formal_logical_description_for_each_table
  - relationship_schema
  - user_groups_roles_and_privileges
  - database_protection_mechanisms
  - stored_procedures_or_postgresql_equivalent_sql_functions
  - triggers
  - views
  architecture_interpretation_rules:
  - PostgreSQL_from_scratch_is_allowed
  - no_deviation_from_required_coursework_artifacts_is_allowed
  - database_logic_must_use_hybrid_split_between_postgresql_and_fastapi
delivery_policy:
  hard_sequence:
  - PHASE-1-FRONTEND-MVP must complete before PHASE-2-DATABASE
  - PHASE-2-DATABASE must complete before PHASE-3-BACKEND
  - PHASE-3-BACKEND must complete before PHASE-4-POLISH
  - No backend implementation may redefine already approved MVP UI flows without creating a contract issue
  - Frontend phase is allowed to use mock data, local fixtures, and temporary adapters
  - Database and backend phases must implement the contract produced by PHASE-1, not redesign the product
  non_negotiable_technology_constraints:
    backend_framework: FastAPI
    orm: SQLAlchemy 2.x
    database: PostgreSQL
    api_style: REST_JSON_first
    architecture_style: modular_monolith
  decision_hierarchy:
  - yaml_contract_only_as_source_of_truth
  - live_frontend_contract_only_for_describing_current_state
  - linear_only_for_task_tracking_and_history
  - conversation_only_when_explicitly_written_back_into_yaml
  contract_change_rule: If a better idea appears during implementation, it cannot change execution until it is explicitly
    discussed and written into YAML.
  divergence_rule: If implementation diverges from YAML, the implementation must be corrected before moving to the next step
    unless YAML itself is explicitly updated first.
  phase_crossing_rule: A single implementation task must stay inside one phase/status boundary. Do not mix frontend, database,
    and backend work in one task unless the phase contract explicitly allows it.
  payload_freeze_rule: PHASE-1 must end with frozen screen payload contracts. PHASE-2 and PHASE-3 implement those contracts,
    not redesign them.
  risk_resolution:
    frontend_first_rework_risk: accepted_and_mitigated_by_payload_freeze_and_yaml_priority
    backend_linear_gap: resolved_by_explicit_linear_governance_defined_in_this_contract
target_mvp:
  product_identity:
    statement: 'Achievno MVP is a mobile-first social achievement product with three equally important modes: for yourself,
      with one friend, inside a group.'
    pillars:
    - achievements
    - progress_tracking
    - history
    - social_visibility
    - approvals_and_evidence
    - challenges
    - lightweight_group_governance
    - discoverability
  mandatory_mvp_capabilities:
