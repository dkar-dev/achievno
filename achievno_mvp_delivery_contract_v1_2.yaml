        - Group achievements must support approver scope selection and minimum approval count
        - Evidence upload UI must support photo, video, document, and comment metadata at the contract level
        affected_current_surfaces:
        - achievement_detail
        - creation_flows
        - group_settings
        source_issue: ACH-18
        acceptance_criteria:
        - Personal achievements do not show approval configuration
        - Friend and group forms can be configured with approval/evidence policies
        - Review-required achievements visibly surface in-review state
      FE-WS-10-discover_and_notifications:
        priority: P1
        outcomes:
        - Keep discover for groups and challenges as part of MVP
