        - Owner must not have leave/report actions for own group
        affected_current_surfaces:
        - create_group
        - group_detail_overview
        source_issue: ACH-17
        acceptance_criteria:
        - 'Create group flow includes missing fields: base permission and invite mechanics'
        - Group settings screens reflect role-based capability differences
        - Invite flow supports internal-friend and external-email paths
      FE-WS-09-approval_and_evidence_ui:
        priority: P0
        outcomes:
        - Expose configuration for approval requirement where relevant
        - Expose configuration for evidence requirement where relevant
