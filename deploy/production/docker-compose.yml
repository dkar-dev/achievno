services:
  api:
    image: achievno-api:production
    build:
      context: ../..
      dockerfile: deploy/production/api.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-api.achievno.dkar-dev.ru,localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://achievno.dkar-dev.ru,http://localhost:3000,http://127.0.0.1:3000}
      ACHIEVNO_AUTH_COOKIE_SECURE: ${ACHIEVNO_AUTH_COOKIE_SECURE:-true}
      ACHIEVNO_AUTH_COOKIE_SAMESITE: ${ACHIEVNO_AUTH_COOKIE_SAMESITE:-None}
      ACHIEVNO_PUBLIC_APP_URL: ${ACHIEVNO_PUBLIC_APP_URL:-https://achievno.dkar-dev.ru}
      EVIDENCE_STORAGE_BACKEND: ${EVIDENCE_STORAGE_BACKEND:-local}
      EVIDENCE_STORAGE_LOCAL_ROOT: ${EVIDENCE_STORAGE_LOCAL_ROOT:-/app/var/evidence}
    ports:
      - "${API_HOST_BIND:-127.0.0.1}:${API_HOST_PORT:-8000}:8000"
    volumes:
      - api_evidence:/app/var/evidence
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  api_evidence:
